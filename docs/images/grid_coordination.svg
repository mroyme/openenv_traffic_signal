<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 315" width="420" height="315" font-family="ui-monospace, monospace, sans-serif">
  <defs>
    <style>
      text { paint-order: stroke fill; }
      .ti  { font-size: 14px; font-weight: 600; text-anchor: middle;
             fill: #111; stroke: #fff; stroke-width: 5; }
      .su  { font-size: 11px; text-anchor: middle;
             fill: #555; stroke: #fff; stroke-width: 4; }
      .lb  { font-size: 12px; font-weight: 700; text-anchor: middle; dominant-baseline: middle;
             fill: #111; stroke: none; }
      .lt  { font-size: 9px; dominant-baseline: middle;
             fill: #555; stroke: #fff; stroke-width: 3; }
      .road{ stroke: #c8c8c8; stroke-width: 14; stroke-linecap: square; fill: none; }
      .nd  { fill: #fff; stroke: #374151; stroke-width: 2; }
      .pg  { fill: #16a34a; }
      .py  { fill: #ca8a04; }
      .pb  { fill: #2563eb; }
      .sep { stroke: #e5e7eb; stroke-width: 1; fill: none; }
      @media (prefers-color-scheme: dark) {
        .ti  { fill: #f0f0f0; stroke: #0a0e1a; }
        .su  { fill: #9ca3af; stroke: #0a0e1a; }
        .lb  { fill: #f0f0f0; }
        .lt  { fill: #9ca3af; stroke: #0a0e1a; }
        .road{ stroke: #4b5563; }
        .nd  { fill: #0f172a; stroke: #94a3b8; }
        .pg  { fill: #4ade80; }
        .py  { fill: #facc15; }
        .pb  { fill: #60a5fa; }
        .sep { stroke: #374151; }
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="210" y="22" class="ti">Grid Coordination</text>
  <text x="210" y="40" class="su">Active agents: 0–8 · Max steps: 200</text>

  <!-- Horizontal roads -->
  <line x1="50" y1="95"  x2="370" y2="95"  class="road"/>
  <line x1="50" y1="175" x2="370" y2="175" class="road"/>
  <line x1="50" y1="255" x2="370" y2="255" class="road"/>

  <!-- Vertical roads (end at bottom node edge) -->
  <line x1="110" y1="57" x2="110" y2="274" class="road"/>
  <line x1="210" y1="57" x2="210" y2="274" class="road"/>
  <line x1="310" y1="57" x2="310" y2="274" class="road"/>

  <!-- Intersection nodes -->
  <circle cx="110" cy="95"  r="19" class="nd"/>
  <text x="110" y="95"  class="lb">0</text>
  <circle cx="210" cy="95"  r="19" class="nd"/>
  <text x="210" y="95"  class="lb">1</text>
  <circle cx="310" cy="95"  r="19" class="nd"/>
  <text x="310" y="95"  class="lb">2</text>

  <circle cx="110" cy="175" r="19" class="nd"/>
  <text x="110" y="175" class="lb">3</text>
  <circle cx="210" cy="175" r="19" class="nd"/>
  <text x="210" y="175" class="lb">4</text>
  <circle cx="310" cy="175" r="19" class="nd"/>
  <text x="310" y="175" class="lb">5</text>

  <circle cx="110" cy="255" r="19" class="nd"/>
  <text x="110" y="255" class="lb">6</text>
  <circle cx="210" cy="255" r="19" class="nd"/>
  <text x="210" y="255" class="lb">7</text>
  <circle cx="310" cy="255" r="19" class="nd"/>
  <text x="310" y="255" class="lb">8</text>

  <!-- Phase dots (varied to show agents act independently) -->
  <circle cx="99"  cy="84"  r="4" class="pg"/>
  <circle cx="199" cy="84"  r="4" class="pg"/>
  <circle cx="299" cy="84"  r="4" class="pb"/>
  <circle cx="99"  cy="164" r="4" class="pg"/>
  <circle cx="199" cy="164" r="4" class="py"/>
  <circle cx="299" cy="164" r="4" class="pb"/>
  <circle cx="99"  cy="244" r="4" class="pb"/>
  <circle cx="199" cy="244" r="4" class="pg"/>
  <circle cx="299" cy="244" r="4" class="py"/>

  <!-- Separator -->
  <line x1="12" y1="286" x2="408" y2="286" class="sep"/>

  <!-- Legend -->
  <circle cx="20"  cy="301" r="4" class="pg"/>
  <text x="28"  y="301" class="lt">N↔S green</text>
  <circle cx="105" cy="301" r="4" class="py"/>
  <text x="113" y="301" class="lt">Yellow (transition)</text>
  <circle cx="242" cy="301" r="4" class="pb"/>
  <text x="250" y="301" class="lt">E↔W green</text>
  <text x="338" y="301" class="lt">· varies per agent</text>
</svg>
